# Local Development Configuration
# Proxies requests from port 80 to the app on port 8081
# Place this file at: /etc/nginx/sites-available/impes-local
# Then create symlink: sudo ln -s /etc/nginx/sites-available/impes-local /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name localhost;

    # Increase client body size for file uploads
    client_max_body_size 100M;
    
    # Increase buffer sizes for large headers (JWT tokens)
    large_client_header_buffers 4 32k;
    client_header_buffer_size 16k;

    # Frontend - serve the React app
    location /impes/ {
        proxy_pass http://127.0.0.1:8081/impes/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Redirect /impes without trailing slash
    location = /impes {
        return 301 /impes/;
    }

    # Redirect root to /impes/
    location = / {
        return 301 /impes/;
    }

    # API requests - handle both /api and /api/
    location /api {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for API calls
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Don't cache API responses
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # Socket.IO WebSocket connections
    location /socket.io/ {
        proxy_pass http://127.0.0.1:8081/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Uploads
    location /uploads/ {
        proxy_pass http://127.0.0.1:8081/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache uploaded files for 7 days
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
