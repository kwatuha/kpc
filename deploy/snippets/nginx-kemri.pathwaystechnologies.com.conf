# System nginx (host): TLS termination + reverse proxy to the KEMRI Docker stack.
#
# The KEMRI compose nginx listens on host port 8184 (see nginx/nginx.conf and
# docker-compose.server.yml). This file is the *host-system* nginx vhost that
# terminates TLS for kemri.pathwaystechnologies.com and forwards traffic to it.
#
# Prerequisites:
#   1. DNS A/AAAA record: kemri.pathwaystechnologies.com -> server public IP.
#   2. KEMRI Docker stack already running on the server (compose nginx on :8184).
#   3. Ports 80/443 reachable from the internet (firewall / security group).
#   4. /etc/nginx/sites-enabled/ exists (Debian/Ubuntu layout). On other distros
#      drop this file into /etc/nginx/conf.d/ instead.
#
# Install (Debian/Ubuntu):
#   sudo cp deploy/snippets/nginx-kemri.pathwaystechnologies.com.conf \
#           /etc/nginx/sites-available/kemri-pathways.conf
#   sudo ln -sf /etc/nginx/sites-available/kemri-pathways.conf \
#           /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d kemri.pathwaystechnologies.com
#
# certbot will rewrite this file with the ssl_certificate paths and an HTTPS
# server block. Re-running certbot is safe.

server {
    listen 80;
    listen [::]:80;
    server_name kemri.pathwaystechnologies.com;

    # Generous upload limit (DOCX/PDF exports, image uploads, etc.).
    client_max_body_size 100M;

    # ACME HTTP-01 challenge (certbot --nginx handles this for us, but if the
    # challenge is ever broken into a webroot we keep the location available).
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/html;
    }

    # Forward everything to the KEMRI Docker stack's nginx (port 8184 on the
    # host loopback). HTTP-to-HTTPS upgrade is added by certbot on first run.
    location / {
        proxy_pass http://127.0.0.1:8184;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

