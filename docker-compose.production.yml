# Production docker-compose (KEMRI clone — ports offset from Machakos to run side-by-side)

services:
  nginx_proxy:
    image: ghcr.io/USERNAME/impes-nginx:latest
    container_name: kemri_nginx_proxy
    ports:
      - "8182:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - api
    restart: unless-stopped

  frontend:
    image: ghcr.io/USERNAME/impes-frontend:latest
    container_name: kemri_react_frontend
    ports:
      - "5278:80"
    depends_on:
      - api
    restart: unless-stopped

  public-dashboard:
    image: ghcr.io/USERNAME/impes-public-dashboard:latest
    container_name: kemri_public_dashboard
    ports:
      - "5279:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    image: ghcr.io/USERNAME/impes-api:latest
    container_name: kemri_node_api
    ports:
      - "3111:3000"
    depends_on:
      postgres_db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_TYPE: postgresql
      DB_HOST: ${DB_HOST:-postgres_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-kemridb}
      DB_PORT: ${DB_PORT:-5432}
    restart: unless-stopped

  postgres_db:
    image: postgres:16-alpine
    container_name: kemri_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-${DB_USER:-postgres}}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-${DB_PASSWORD:-postgres}}
      POSTGRES_DB: ${POSTGRES_DB:-${DB_NAME:-kemridb}}
    volumes:
      - kemri_postgres_data:/var/lib/postgresql/data
    ports:
      - "5534:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-${DB_USER:-postgres}}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  kemri_postgres_data:
